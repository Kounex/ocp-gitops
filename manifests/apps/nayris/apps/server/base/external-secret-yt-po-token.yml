apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: yt-po-token
  namespace: nayris
  annotations:
    argocd.argoproj.io/sync-wave: '230'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: yt-po-token
  data:
    - secretKey: po_token
      remoteRef:
        key: NAYRIS_YT_PO_TOKEN