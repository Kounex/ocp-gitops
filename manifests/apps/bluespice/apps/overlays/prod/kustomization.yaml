apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/resource-limits.yaml
  - path: patches/prod-config.yaml
  - target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: wiki
    patch: |
      - op: replace
        path: /spec/host
        value: wiki.apps.ocp.kounex.com
      - op: add
        path: /spec/tls
        value:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
  - target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: wire
    patch: |
      - op: replace
        path: /spec/host
        value: wiki.apps.ocp.kounex.com
      - op: add
        path: /spec/tls
        value:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
  - target:
      group: route.openshift.io
      version: v1
      kind: Route
      name: diagram
    patch: |
      - op: replace
        path: /spec/host
        value: wiki.apps.ocp.kounex.com
      - op: add
        path: /spec/tls
        value:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
