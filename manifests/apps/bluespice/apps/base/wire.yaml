apiVersion: v1
kind: Service
metadata:
  name: wire
  namespace: bluespice
  labels:
    app.kubernetes.io/name: wire
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: stateless
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app.kubernetes.io/name: wire
  ports:
    - name: http
      port: 3333
      targetPort: 3333
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wire
  namespace: bluespice
  labels:
    app.kubernetes.io/name: wire
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: stateless
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wire
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wire
        app.kubernetes.io/part-of: bluespice
        app.kubernetes.io/component: stateless
    spec:
      containers:
        - name: wire
          image: bluespice/wire:5.2.4
          ports:
            - containerPort: 3333
              name: http
          env:
            - name: WIRE_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: bluespice-config
                  key: WIRE_LOG_LEVEL
            - name: WIRE_WIKI_BASE_PATH
              valueFrom:
                configMapKeyRef:
                  name: bluespice-config
                  key: WIRE_WIKI_BASE_PATH
            - name: WIRE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bluespice-secrets
                  key: INTERNAL_WIRE_API_KEY
            - name: WIRE_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: bluespice-secrets
                  key: INTERNAL_WIKI_TOKEN_AUTH_SALT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
