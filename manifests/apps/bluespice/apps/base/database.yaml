apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: bluespice
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: database
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: bluespice
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: database
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: database
        app.kubernetes.io/part-of: bluespice
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: bluespice-anyuid
      containers:
        - name: database
          image: bluespice/database:5.2.4
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bluespice-secrets
                  key: DB_ROOT_PASS
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: bluespice-config
                  key: DB_NAME
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: bluespice-config
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bluespice-secrets
                  key: DB_PASS
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: database-data
              mountPath: /config/databases
            - name: database-logs
              mountPath: /config/log/mysql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: database-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
