apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: bluespice
  labels:
    app.kubernetes.io/name: search
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: search
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: search
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: search
  namespace: bluespice
  labels:
    app.kubernetes.io/name: search
    app.kubernetes.io/part-of: bluespice
    app.kubernetes.io/component: search
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: search
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: search
        app.kubernetes.io/part-of: bluespice
        app.kubernetes.io/component: search
    spec:
      serviceAccountName: bluespice-anyuid
      initContainers:
        # OpenSearch requires vm.max_map_count=262144.
        # This privileged init container sets it at pod level.
        # Alternative: use the Node Tuning Operator cluster-wide and remove this.
        - name: sysctl-init
          image: busybox:1.38
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: search
          image: bluespice/search:5.2.4
          ports:
            - containerPort: 9200
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: search-data
              mountPath: /usr/share/opensearch/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: search-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
